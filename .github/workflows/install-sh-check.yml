name: Check install.sh

on:
  pull_request:

jobs:
  install-script:
    name: install.sh checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate install.sh syntax
        run: sh -n install.sh

      - name: Validate skill script syntax
        run: |
          bash -n vibe-code-audit/scripts/run_index.sh
          bash -n vibe-code-audit/scripts/run_agentroot_embed.sh
          bash -n vibe-code-audit/scripts/build_derived_artifacts.sh
          bash -n vibe-code-audit/scripts/build_read_plan.sh
          bash -n vibe-code-audit/scripts/render_system_map.sh
          bash -n vibe-code-audit/scripts/render_report_pdf.sh

      - name: Run mocked run_index smoke tests
        run: bash tests/run_index_mock_smoke.sh

      - name: Run optional PDF script smoke check
        shell: bash
        run: |
          set -euo pipefail
          tmp_dir="$(mktemp -d)"
          report_path="$tmp_dir/audit_report.md"
          dot_path="$tmp_dir/system_map.dot"
          cat > "$dot_path" <<'EOF_DOT'
digraph system_map {
  rankdir=TB;
  node [shape=box, style="rounded,filled", fillcolor="#D6EAF8"];
  main [label="main"];
  service [label="service"];
  storage [label="storage"];
  main -> service;
  service -> storage;
}
EOF_DOT
          cat > "$report_path" <<'EOF_MD'
# 1. Executive Summary

Summary text.

# 2. System Map

```
ASCII placeholder
```
EOF_MD

          map_out="$(bash vibe-code-audit/scripts/render_system_map.sh --report "$report_path")"
          printf '%s\n' "$map_out"
          printf '%s\n' "$map_out" | grep -Eq '^SYSTEM_MAP_(PATH|SKIPPED)='
          if printf '%s\n' "$map_out" | grep -q '^SYSTEM_MAP_PATH='; then
            test -s "$tmp_dir/system_map.png"
            grep -q 'system_map.png' "$report_path"
          fi

          pdf_out="$(bash vibe-code-audit/scripts/render_report_pdf.sh --report "$report_path" --map-mode crate)"
          printf '%s\n' "$pdf_out"
          printf '%s\n' "$pdf_out" | grep -Eq '^PDF_(PATH|SKIPPED)='
          if printf '%s\n' "$pdf_out" | grep -q '^PDF_PATH='; then
            test -s "$tmp_dir/audit_report.pdf"
          fi

      - name: Verify local install creates symlinks
        shell: bash
        run: |
          set -euo pipefail
          codex_dir="$(mktemp -d)"
          claude_dir="$(mktemp -d)"

          CODEX_SKILLS_DIR="$codex_dir" CLAUDE_SKILLS_DIR="$claude_dir" sh install.sh --yes --skip-deps

          test -L "$codex_dir/vibe-code-audit"
          test -L "$claude_dir/vibe-code-audit"

          codex_target="$(readlink "$codex_dir/vibe-code-audit")"
          claude_target="$(readlink "$claude_dir/vibe-code-audit")"
          expected_target="$GITHUB_WORKSPACE/vibe-code-audit"

          test "$codex_target" = "$expected_target"
          test "$claude_target" = "$expected_target"

      - name: Verify piped install creates copied files
        shell: bash
        run: |
          set -euo pipefail
          codex_dir="$(mktemp -d)"
          run_dir="$(mktemp -d)"

          cd "$run_dir"
          cat "$GITHUB_WORKSPACE/install.sh" | env \
            VIBE_CODE_AUDIT_RAW_BASE="file://$GITHUB_WORKSPACE" \
            CODEX_SKILLS_DIR="$codex_dir" \
            sh -s -- --yes --skip-deps --codex-only

          test -d "$codex_dir/vibe-code-audit"
          test ! -L "$codex_dir/vibe-code-audit"
          test -f "$codex_dir/vibe-code-audit/SKILL.md"
          test -f "$codex_dir/vibe-code-audit/REPORT_TEMPLATE.md"
          test -f "$codex_dir/vibe-code-audit/scripts/run_index.sh"
          test -x "$codex_dir/vibe-code-audit/scripts/run_index.sh"
          test -f "$codex_dir/vibe-code-audit/scripts/run_agentroot_embed.sh"
          test -x "$codex_dir/vibe-code-audit/scripts/run_agentroot_embed.sh"
          test -f "$codex_dir/vibe-code-audit/scripts/build_read_plan.sh"
          test -x "$codex_dir/vibe-code-audit/scripts/build_read_plan.sh"
          test -f "$codex_dir/vibe-code-audit/scripts/build_derived_artifacts.sh"
          test -x "$codex_dir/vibe-code-audit/scripts/build_derived_artifacts.sh"
          test -f "$codex_dir/vibe-code-audit/scripts/render_system_map.sh"
          test -x "$codex_dir/vibe-code-audit/scripts/render_system_map.sh"
          test -f "$codex_dir/vibe-code-audit/scripts/render_report_pdf.sh"
          test -x "$codex_dir/vibe-code-audit/scripts/render_report_pdf.sh"
          test -f "$codex_dir/vibe-code-audit/references/core/process.md"
          test -f "$codex_dir/vibe-code-audit/references/core/context-budget.md"
          test -f "$codex_dir/vibe-code-audit/references/claude/subagents-and-model-routing.md"
